<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lettera Virtuale</title>
    <style>
        /* Sfondo e font generale */
        body {
            background-color: #f4f1ea; /* Colore carta antica */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
            color: #333;
        }

        /* Contenitore principale */
        .card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #e0d8c3;
            max-width: 400px;
        }

        h1 {
            font-weight: normal;
            color: #5d5c58;
            margin-bottom: 20px;
        }

        /* Decorazione floreale o simbolica */
        .decoration {
            font-size: 24px;
            color: #c5a059;
            margin-bottom: 20px;
        }

        /* Il Bottone */
        .btn-lettera {
            display: inline-block;
            background-color: #c5a059;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
        }

        .btn-lettera:hover {
            background-color: #ac8b4a;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(197, 160, 89, 0.4);
        }

        /* Piccola nota a piè di pagina */
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="decoration">✧ ✉ ✧</div>
        <h1>Solo un pò di righette per te.</h1>
        <p>Clicca qui sotto per leggere.</p>
        
        <!-- SOSTITUISCI IL LINK QUI SOTTO CON IL TUO LINK DI GOOGLE DOCS -->
        <a href="https://docs.google.com/document/d/1q8RpGGeL3XqAibmpEmRWb8XOjWl7QuzD4VssNQeY0r4/edit?hl=it&tab=t.0" target="_blank" class="btn-lettera">
            💝🫶🏿
        </a>
        <div class="footer">Pensato per la migliore persona al mondo.</div>
    </div>

</body>
</html>
